server:
  port: 8082

spring:
  application:
    name: template-service
  datasource:
    url: jdbc:postgresql://localhost:5433/templates_db
    username: postgres
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: my-256-bit-secret-key-for-development-only

logging:
  level:
    com.notification: DEBUG
